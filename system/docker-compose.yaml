services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    environment:
      - TZ=Europe/Amsterdam
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/homelab/system/portainer:/data
    ports:
      - "9000:9000"
      - "9443:9443"
    restart: unless-stopped
